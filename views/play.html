<!DOCTYPE html>
<html>

<head>
    <title>Cute Fckn' tanks!</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/base.css" type="text/css" />
    <style>
        #game {
            width: 800px;
            height: 600px;
            margin: auto;
            display: table-cell;
        }

        #gameContainer {
            overflow: hidden;
        }

        #wrapper {
            display: table;
            margin: auto;
        }

        .playerCardHolder {
            border-radius: 5px;
            border: 1px solid blueviolet;
            background-color: #A554E8;
            width: 250px;
            display: table-cell;
            vertical-align: top;
        }

        .playerCardWrapper {
            border: 2px solid;
            border-radius: 4px;
            width: 240px;
            margin: auto;
            margin-top: 13px;
            overflow: hidden;
        }

        .playerPortrait {
            width: 100px;
            height: 100px;
            display: table-cell;
        }

        .playerName {
            font-weight: bold;
        }

        .playerMiscInfo {
            display: table-cell;
            vertical-align: top;
            padding: 4px;
            text-wrap: nowrap;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body ng-app="ViewApp" ng-class="connectionStatus">
    <div id="wrapper" ng-controller="gameController">
        <div id="leftPlayerChart" class="playerCardHolder">
            <playercard player="player" ng-repeat="player in gameWorld.playerList" ng-if="$even"></playercard>
        </div>
        <div id="gameContainer">
            <canvas id="game" width="800" height="600"></canvas>
        </div>
        <div id="rightPlayerChart" class="playerCardHolder">
            <playercard player="player" ng-repeat="player in gameWorld.playerList" ng-if="$odd"></playercard>
        </div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.5.11/angular.min.js"></script>
    <script src="/dist/viewer.bundle.js"></script>
</body>

</html>
